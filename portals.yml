# -- Title filter --
# The scanner uses these keywords to decide if a title is relevant.
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # [CUSTOMIZE] Add keywords matching YOUR target roles
    # -- AI/ML roles --
    - "AI"
    - "ML"
    - "Machine Learning"
    - "LLM"
    - "Agent"
    - "Agentic"
    - "GenAI"
    - "Generative AI"
    - "NLP"
    - "LLMOps"
    - "MLOps"
    - "Voice AI"
    - "Conversational AI"
    - "Speech"
    # -- German AI/ML keywords (DACH market) --
    - "KI"
    - "Künstliche Intelligenz"
    - "KI Engineer"
    - "KI Trainer"
    - "Dozent"
    - "Weiterbildung"
    # -- Engineering roles --
    - "Platform Engineer"
    - "Forward Deployed"
    - "Deployed Engineer"
    - "Integration Engineer"
    # NOTE: "Solutions Engineer" / "Solutions Architect" / "Customer Engineer"
    # removed from positive — overwhelmingly pre-sales; pulled in off-archetype
    # roles (Hightouch/Cresta). FDE roles use "Forward Deployed", which stays.
    # -- Product roles --
    - "Product Manager"
    - "Technical PM"
    # -- Automation roles --
    - "Automation"
    - "Hyperautomation"
    - "Low-Code"
    - "No-Code"
    - "RevOps"
    - "Business Systems"
    - "Internal Tools"
    - "Transformation"
    # -- Non-standard / specialist / implementation titles --
    - "AI Specialist"
    - "AI Execution"
    - "AI Implementation"
    - "AI Strategy"
    - "AI Adoption"
    - "AI Operations"
    - "AI Ops"
  negative:
    # [CUSTOMIZE] Add keywords for roles you want to exclude.
    # NOTE: matches are word-boundary, case-insensitive.
    # -- Seniority exclusions (keep mid / entry-level only) --
    - "Senior"
    - "Sr"
    - "Staff"
    - "Principal"
    - "Distinguished"
    - "Lead"
    - "Director"
    - "Head"
    - "VP"
    - "Vice President"
    - "Chief"
    - "Manager"            # EM / people-management roles (PM is not a Deepak target either)
    - "Architect"          # Solutions Architect tends to be senior / 5+ yrs
    - "Architecture"       # covers "Solutions Architecture" roles
    # -- Sales / GTM exclusions (slip through "AI Products" titles) --
    - "Business Development"
    - "BDR"
    - "GTM"
    - "SDR"
    - "Account Executive"
    - "Sales Engineer"
    - "Pre-Sales"
    - "Presales"
    - "Solutions Engineer"     # pre-sales SE — FDE roles keep "Forward Deployed" (positive)
    - "Customer Engineer"      # pre-sales / SE
    - "Sales Representative"
    - "Account Manager"
    - "Customer Success"
    # -- Non-engineering / wrong-function titles --
    - "Designer"               # UX / "Conversational AI Designer"
    - "Counsel"                # legal (e.g. "Assistant General Counsel - AI")
    - "Recruiter"
    - "Talent Acquisition"
    - "Test Automation"        # QA
    - "QA Engineer"
    # -- "Agent" false positives (positive "Agent" matches AI agents, not these) --
    - "Customer Service"
    - "Service Agent"
    - "Support Agent"
    - "Sales Agent"
    # -- Intern (not entry-level full-time) --
    - "Intern"
    - "Internship"
    # -- Tech stacks outside Deepak's profile --
    - ".NET"
    - "Java "
    - "iOS"
    - "Android"
    - "PHP"
    - "Ruby"
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "ASIC"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "Salesforce Admin"
    - "SAP"
    - "Oracle EBS"
    - "Mainframe"
    - "COBOL"
  seniority_boost:
    # These prefixes add relevance but are not required
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"
    - "Director"

# -- Search queries --
# Each query triggers a WebSearch. Use site: to filter by portal.
# The scanner extracts title, URL, and company from results.

search_queries:
  # -- Ashby --
  - name: Ashby — AI PM
    query: 'site:jobs.ashbyhq.com "AI Product Manager" OR "Senior Product Manager AI" remote'
    enabled: true

  - name: Ashby — Solutions Architect
    query: 'site:jobs.ashbyhq.com "Solutions Architect" AI OR automation remote'
    enabled: true

  - name: Ashby — AI Engineer
    query: 'site:jobs.ashbyhq.com "AI Engineer" OR "LLM Engineer" OR "Forward Deployed" remote'
    enabled: true

  - name: Ashby — Agentic
    query: 'site:jobs.ashbyhq.com "Agentic" OR "AI Agent" OR "Automation Architect" remote'
    enabled: true

  # -- Greenhouse --
  - name: Greenhouse — AI PM
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "AI Product Manager" OR "Senior Product Manager" AI remote'
    enabled: true

  - name: Greenhouse — SA & FDE
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Solutions Architect" OR "Forward Deployed" AI remote'
    enabled: true

  - name: Greenhouse — AI Engineer
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "AI Engineer" OR "LLM" OR "Agentic" remote'
    enabled: true

  # -- Workable --
  - name: Workable — AI Roles
    query: 'site:apply.workable.com "AI" "Product Manager" OR "Solutions Architect" OR "AI Engineer" remote'
    enabled: true

  # -- No-Code / Low-Code / Automation --
  - name: Ashby — No-Code & Automation
    query: 'site:jobs.ashbyhq.com "no-code" OR "low-code" OR "automation engineer" OR "n8n" OR "Make" OR "Airtable" remote senior'
    enabled: true

  - name: Greenhouse — No-Code & Automation
    query: 'site:job-boards.greenhouse.io "no-code" OR "low-code" OR "automation engineer" OR "business systems" senior remote'
    enabled: true

  - name: GTM Engineer — All portals
    query: '"GTM Engineer" OR "RevOps Engineer" OR "Growth Engineer" automation Airtable OR Make OR Clay remote'
    enabled: true

  # -- Voice AI & Conversational AI --
